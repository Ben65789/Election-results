<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UK Local Elections 2025 – Live Results</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  max-width: 100%;
  overflow-x: hidden;
  background: #0d1117;
}

.er-widget {
  font-family: 'DM Sans', sans-serif;
  color: #fff;
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.er-header {
  background: #111820;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #21303f;
}

.er-title {
  font-size: 1.2rem;
  font-weight: 700;
  min-width: 0;
}

.er-title span { color: #e2a930; }

.er-live-badge {
  background: #da3633;
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 0.7rem;
  font-weight: 700;
}

/* TABS */
.er-tabs-nav {
  display: flex;
  overflow-x: auto;
  background: #111820;
}

.er-tab-btn {
  flex: 1;
  min-width: 90px;
  padding: 12px;
  border: none;
  background: none;
  color: #8a9ab0;
  font-weight: 600;
}

.er-tab-btn.er-active {
  color: #fff;
  border-bottom: 2px solid #e2a930;
}

/* PANEL */
.er-panel {
  padding: 14px;
}

/* CARDS */
.er-card {
  background: #161d26;
  border: 1px solid #21303f;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
}

/* GRID */
.er-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

/* RESULT */
.er-result {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* FOOTER */
.er-footer {
  padding: 10px;
  text-align: center;
  font-size: 0.7rem;
  color: #8a9ab0;
}

/* DESKTOP */
@media (min-width: 700px) {
  .er-panel {
    padding: 24px;
  }

  .er-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>

<body>

<div class="er-widget">

  <div class="er-header">
    <div class="er-title">🗳 UK Elections <span>2025</span></div>
    <div class="er-live-badge">LIVE</div>
  </div>

  <div class="er-tabs-nav">
    <button class="er-tab-btn er-active">Local</button>
    <button class="er-tab-btn">Mayoral</button>
    <button class="er-tab-btn">Scotland</button>
  </div>

  <div class="er-panel">

    <div class="er-card">
      <strong>Seats Declared</strong><br>
      120 / 300 (40%)
    </div>

    <div class="er-grid">
      <div class="er-card">Labour +12</div>
      <div class="er-card">Conservative -8</div>
      <div class="er-card">Green +3</div>
      <div class="er-card">Reform +5</div>
    </div>

    <div class="er-card">
      <strong>Latest Result</strong>
      <div class="er-result">
        <span>Guildford</span>
        <span>Conservative</span>
        <span>Maj: 1200</span>
      </div>
    </div>

  </div>

  <div class="er-footer">
    Updates every 60 seconds
  </div>

</div>

</body>
</html>
