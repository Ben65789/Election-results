<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Results</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0b1220;
  font-family: 'Inter', sans-serif;
  color: #e5e7eb;
}

/* CONTAINER */
.container {
  max-width: 950px;
  margin: auto;
  background: #0f172a;
  border-radius: 16px;
  overflow: hidden;
}

/* HEADER */
.header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.title {
  font-size: 20px;
  font-weight: 800;
}

.live {
  font-size: 12px;
  background: rgba(255,0,0,0.15);
  padding: 4px 10px;
  border-radius: 20px;
}

/* TABS */
.tabs {
  display: flex;
  overflow-x: auto;
}

.tab {
  flex: 0 0 auto;
  padding: 14px;
  font-size: 12px;
  color: #9ca3af;
  border-bottom: 2px solid transparent;
  cursor: pointer;
}

.tab.active {
  color: #fff;
  border-bottom: 2px solid #facc15;
}

/* CONTENT */
.content {
  padding: 20px;
}

/* PROGRESS */
.progress-box {
  background: #111827;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 20px;
}

.progress-top {
  display: flex;
  justify-content: space-between;
}

.progress-percent {
  font-size: 34px;
  font-weight: 700;
}

.progress-bar {
  height: 8px;
  background: #1f2937;
  border-radius: 20px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #facc15, #ef4444);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.card {
  background: #111827;
  padding: 14px;
  border-radius: 14px;
  border-left: 4px solid;
}

.card h4 {
  font-size: 11px;
  color: #9ca3af;
  margin-bottom: 6px;
}

.badges {
  display: flex;
  gap: 6px;
}

.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.gain { background: rgba(34,197,94,0.2); color: #4ade80; }
.loss { background: rgba(239,68,68,0.2); color: #f87171; }

/* RESULTS */
.results {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.result {
  background: #111827;
  padding: 14px;
  border-radius: 14px;
  border-left: 4px solid;
  display: flex;
  justify-content: space-between;
}

.result small {
  color: #9ca3af;
}

/* FOOTER */
.footer {
  padding: 10px;
  text-align: center;
  font-size: 12px;
  color: #6b7280;
}

/* MOBILE */
@media (max-width: 600px) {
  .header { flex-direction: column; gap: 10px; }
  .result { flex-direction: column; gap: 6px; }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">🗳 UK Elections 2025</div>
    <div class="live">LIVE</div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>

  <div class="footer" id="updated">Updating...</div>

</div>

<script>
var SHEET_ID = '1pqObzBVhI2vW1lijyoPvsUQzvG28-bz0qqUBRnPsUnA';

var TABS = [
  {key:'local', label:'Local', sheet:'LocalGov'},
  {key:'scot', label:'Scotland', sheet:'Scottish'},
  {key:'senedd', label:'Wales', sheet:'Senedd'},
  {key:'mayor', label:'Mayoral', sheet:'Mayoral'}
];

var COLORS = {
  labour:'#E4003B',
  conservative:'#003087',
  libdem:'#FAA61A',
  green:'#00B140',
  reform:'#12B6CF'
};

function color(name){
  name = (name||'').toLowerCase();
  for(let k in COLORS){
    if(name.includes(k)) return COLORS[k];
  }
  return '#6b7280';
}

async function fetchSheet(name){
  let res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${name}`);
  let text = await res.text();
  let rows = text.split('\n').map(r=>r.split(','));

  let data={total:0,declared:0,parties:[],results:[]};
  let mode='meta';

  rows.forEach(r=>{
    let k=(r[0]||'').toLowerCase();
    if(k==='total_seats') data.total=r[1];
    else if(k==='declared') data.declared=r[1];
    else if(k==='party') mode='p';
    else if(k==='area') mode='r';
    else if(mode==='p') data.parties.push({n:r[0],g:r[1],l:r[2]});
    else if(mode==='r') data.results.push({a:r[0],p:r[1],m:r[2],t:r[3]});
  });

  return data;
}

function render(data){
  let pct = Math.round((data.declared/data.total)*100)||0;

  let html = `
  <div class="progress-box">
    <div class="progress-top">
      <span>Seats Declared</span>
      <div class="progress-percent">${pct}%</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
  </div>

  <div class="grid">
    ${data.parties.map(p=>`
      <div class="card" style="border-color:${color(p.n)}">
        <h4>${p.n}</h4>
        <div class="badges">
          <span class="badge gain">+${p.g}</span>
          <span class="badge loss">-${p.l}</span>
        </div>
      </div>
    `).join('')}
  </div>

  <div class="results">
    ${data.results.slice(0,4).map(r=>`
      <div class="result" style="border-color:${color(r.p)}">
        <div>
          <div>${r.a}</div>
          <small>${r.p}</small>
        </div>
        <div>
          <div>Maj: ${r.m}</div>
          <small>${r.t}</small>
        </div>
      </div>
    `).join('')}
  </div>
  `;

  document.getElementById('content').innerHTML = html;
}

async function load(tab){
  let data = await fetchSheet(tab.sheet);
  render(data);
}

function init(){
  let tabsHTML = TABS.map((t,i)=>`
    <div class="tab ${i===0?'active':''}" onclick="selectTab(${i})">${t.label}</div>
  `).join('');

  document.getElementById('tabs').innerHTML = tabsHTML;
  load(TABS[0]);
}

function selectTab(i){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[i].classList.add('active');
  load(TABS[i]);
}

init();
</script>

</body>
</html>
