<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>UK Local Elections 2025 – Live Results</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* =========================
   🔴 GLOBAL SCROLL FIX
   ========================= */
html, body {
  margin: 0;
  padding: 0;
  background: #0d1117;

  /* FIX: removes “boxed artifact scroll” feel */
  min-height: 100%;
  height: auto;

  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-y;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar {
  display: none;
}

/* ── Widget shell ── */
.er-widget {
  font-family: 'DM Sans', sans-serif;
  background: #0d1117;
  color: #ffffff;
  width: 100%;
  display: flex;
  flex-direction: column;

  /* KEY FIX: makes it behave like full page, not a box */
  min-height: 100dvh;
}

/* ── Header ── */
.er-header {
  background: #111820;
  padding: 22px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #21303f;
}

.er-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -0.01em;
}

.er-title span { color: #e2a930; }

.er-live-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  background: #da3633;
  color: #fff;
  padding: 6px 14px;
  border-radius: 5px;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.er-live-dot {
  width: 7px;
  height: 7px;
  background: #fff;
  border-radius: 50%;
  animation: er-blink 1.4s infinite;
}

@keyframes er-blink {
  0%,100% { opacity:1 }
  50% { opacity:0.2 }
}

/* ── Tabs ── */
.er-tabs-nav {
  display: flex;
  background: #111820;
  border-bottom: 1px solid #21303f;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  touch-action: pan-x;
}

.er-tabs-nav::-webkit-scrollbar {
  display: none;
}

.er-tab-btn {
  flex: 1;
  min-width: 130px;
  padding: 16px 18px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  color: #8a9ab0;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.18s;
  text-align: center;
  white-space: nowrap;
}

.er-tab-btn:hover {
  color: #fff;
  background: rgba(255,255,255,0.04);
}

.er-tab-btn.er-active {
  color: #fff;
  border-bottom-color: #e2a930;
}

/* ── Panels ── */
#erPanels {
  display: block;
}

.er-panel {
  display: none;
  padding: 32px 36px 40px;
}

.er-panel.er-active {
  display: block;
}

/* ── IMPORTANT: prevent nested scroll traps ── */
.er-results-list,
.er-overall-list,
.er-parties-grid {
  height: auto;
  overflow: visible;
}

/* ── Progress box ── */
.er-progress-box {
  background: #161d26;
  border: 1px solid #21303f;
  border-radius: 10px;
  padding: 22px 28px;
  margin-bottom: 30px;
}

/* (rest of your original CSS stays unchanged below) */

.er-progress-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 14px;
}

.er-progress-label {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #8a9ab0;
}

.er-progress-pct {
  font-size: 2.4rem;
  font-weight: 700;
  color: #fff;
}

.er-progress-track {
  height: 9px;
  background: #21303f;
  border-radius: 5px;
  overflow: hidden;
}

.er-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #e2a930 0%, #e4003b 100%);
}

/* (you already have the rest of your styles — unchanged) */

</style>
</head>

<body>

<div class="er-widget">
  <div class="er-header">
    <div class="er-title">🗳 UK Elections <span>2025</span> – Live Results</div>
    <div class="er-live-badge"><div class="er-live-dot"></div>Live</div>
  </div>

  <div class="er-tabs-nav" id="erTabsNav"></div>
  <div id="erPanels"></div>

  <div class="er-footer">
    <span>Refreshes every 60 seconds</span>
    <span id="erLastUpdated">—</span>
  </div>
</div>

<script>
// (UNCHANGED - your JS stays exactly the same)
</script>

</body>
</html>
