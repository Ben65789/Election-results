<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Elections 2025</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  font-family: 'DM Sans', sans-serif;
}

/* CONTAINER */
.er-widget {
  background: #0d1117;
  color: #fff;
  max-width: 960px;
  margin: auto;
  border-radius: 12px;
  overflow: hidden;
}

/* HEADER */
.er-header {
  padding: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #21303f;
}

.er-title {
  font-size: clamp(1rem, 3vw, 1.4rem);
  font-weight: 800;
}
.er-title span { color: #e2a930; }

.er-live {
  background: #da3633;
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 6px;
}

/* TABS */
.er-tabs {
  display: flex;
  overflow-x: auto;
  border-bottom: 1px solid #21303f;
}
.er-tab {
  flex: 0 0 auto;
  padding: 14px;
  font-size: 12px;
  color: #8b99aa;
  border-bottom: 2px solid transparent;
}
.er-tab.active {
  color: #fff;
  border-bottom: 2px solid #e2a930;
}

/* CONTENT */
.er-content {
  padding: 16px;
}

/* PROGRESS */
.er-progress {
  background: #161d26;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}

.er-progress-top {
  display: flex;
  justify-content: space-between;
}

.er-progress-percent {
  font-size: clamp(20px, 6vw, 32px);
  font-weight: 700;
}

.er-bar {
  height: 8px;
  background: #21303f;
  border-radius: 20px;
  overflow: hidden;
  margin-top: 8px;
}

.er-fill {
  height: 100%;
  background: linear-gradient(90deg,#e2a930,#e4003b);
}

/* GRID */
.er-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap: 10px;
  margin-bottom: 16px;
}

.er-card {
  background: #161d26;
  padding: 12px;
  border-radius: 10px;
  border-left: 4px solid;
}

.er-card h4 {
  font-size: 11px;
  margin-bottom: 6px;
  color: #8b99aa;
}

.er-badges {
  display: flex;
  gap: 6px;
}

.er-badge {
  padding: 4px 6px;
  font-size: 12px;
  border-radius: 4px;
}

.gain { background: rgba(35,134,54,0.2); color:#3fb950; }
.loss { background: rgba(218,54,51,0.2); color:#f85149; }

/* RESULTS */
.er-results {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.er-result {
  background: #161d26;
  padding: 12px;
  border-radius: 10px;
  border-left: 4px solid;
  display: flex;
  justify-content: space-between;
}

.er-result small {
  color: #8b99aa;
}

/* MOBILE FIXES */
@media (max-width: 600px) {

  .er-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }

  .er-result {
    flex-direction: column;
    gap: 6px;
  }

  .er-grid {
    grid-template-columns: repeat(2,1fr);
  }

}
</style>
</head>

<body>

<div class="er-widget">

  <div class="er-header">
    <div class="er-title">🗳 UK Elections <span>2025</span></div>
    <div class="er-live">LIVE</div>
  </div>

  <div class="er-tabs" id="tabs"></div>
  <div class="er-content" id="content"></div>

</div>

<script>
var SHEET_ID='1pqObzBVhI2vW1lijyoPvsUQzvG28-bz0qqUBRnPsUnA';

var TABS=[
  {label:'Local',sheet:'LocalGov'},
  {label:'Scotland',sheet:'Scottish'},
  {label:'Wales',sheet:'Senedd'},
  {label:'Mayoral',sheet:'Mayoral'}
];

var COLORS={
  labour:'#E4003B',
  conservative:'#003087',
  libdem:'#FAA61A',
  green:'#00B140',
  reform:'#12B6CF'
};

function color(n){
  n=(n||'').toLowerCase();
  for(let k in COLORS) if(n.includes(k)) return COLORS[k];
  return '#6b7280';
}

function parseCSV(t){
  return t.split('\n').map(r=>{
    let a=[],c='',q=false;
    for(let i=0;i<r.length;i++){
      let ch=r[i];
      if(ch=='"') q=!q;
      else if(ch==','&&!q){a.push(c);c=''}
      else c+=ch;
    }
    a.push(c);
    return a;
  });
}

async function load(sheet){
  let res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheet}`);
  let txt=await res.text();
  let rows=parseCSV(txt);

  let total=0,declared=0,parties=[],results=[],mode='';

  rows.forEach(r=>{
    let k=(r[0]||'').toLowerCase();
    if(k==='total_seats') total=r[1];
    else if(k==='declared') declared=r[1];
    else if(k==='party') mode='p';
    else if(k==='area') mode='r';
    else if(mode==='p') parties.push(r);
    else if(mode==='r') results.push(r);
  });

  let pct=Math.round((declared/total)*100)||0;

  document.getElementById('content').innerHTML=`
    <div class="er-progress">
      <div class="er-progress-top">
        <span>Seats Declared</span>
        <div class="er-progress-percent">${pct}%</div>
      </div>
      <div class="er-bar"><div class="er-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="er-grid">
      ${parties.map(p=>`
        <div class="er-card" style="border-color:${color(p[0])}">
          <h4>${p[0]}</h4>
          <div class="er-badges">
            <span class="er-badge gain">+${p[1]}</span>
            <span class="er-badge loss">-${p[2]}</span>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="er-results">
      ${results.slice(0,3).map(r=>`
        <div class="er-result" style="border-color:${color(r[1])}">
          <div>
            <div>${r[0]}</div>
            <small>${r[1]}</small>
          </div>
          <div>
            <div>Maj: ${r[2]}</div>
            <small>${r[3]}</small>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function init(){
  document.getElementById('tabs').innerHTML=TABS.map((t,i)=>`
    <div class="er-tab ${i===0?'active':''}" onclick="selectTab(${i})">${t.label}</div>
  `).join('');
  load(TABS[0].sheet);
}

function selectTab(i){
  document.querySelectorAll('.er-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.er-tab')[i].classList.add('active');
  load(TABS[i].sheet);
}

init();
</script>

</body>
</html>
