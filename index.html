<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

.er-widget {
  font-family: 'DM Sans', sans-serif;
  background: radial-gradient(circle at top, #111827, #0b1220);
  color: #e6edf3;
  border-radius: 14px;
  overflow: hidden;
  max-width: 960px;
  margin: 0 auto;
}

/* HEADER */
.er-header {
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.er-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.2rem, 2.5vw, 1.5rem);
  font-weight: 800;
}

.er-title span {
  color: #fbbf24;
}

/* LIVE BADGE */
.er-live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 0.7rem;
}

.er-live-dot {
  width: 8px;
  height: 8px;
  background: #ef4444;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* TABS */
.er-tabs-nav {
  display: flex;
  overflow-x: auto;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.er-tab-btn {
  flex: 0 0 auto;
  min-width: 130px;
  padding: 14px;
  font-size: 0.75rem;
  color: #9ca3af;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  transition: all 0.2s ease;
}

.er-tab-btn.er-active {
  color: #fff;
  border-bottom: 3px solid #fbbf24;
}

/* PANELS */
.er-panel {
  padding: 24px;
}

/* PROGRESS */
.er-progress-box {
  background: linear-gradient(145deg, #111827, #0f172a);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.er-progress-pct {
  font-size: clamp(26px, 5vw, 40px);
  font-weight: 700;
}

.er-progress-track {
  height: 10px;
  background: #1f2937;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
}

.er-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #fbbf24, #ef4444);
  border-radius: 999px;
}

/* SECTION */
.er-section-label {
  font-size: 0.7rem;
  letter-spacing: 1px;
  color: #9ca3af;
  margin: 18px 0 10px;
}

/* PARTY GRID */
.er-parties-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}

.er-party-card {
  background: linear-gradient(145deg, #111827, #0f172a);
  border-radius: 16px;
  padding: 14px;
  border-left: 4px solid;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  transition: transform 0.2s;
}

.er-party-card:active {
  transform: scale(0.97);
}

.er-party-name {
  font-size: 0.7rem;
  color: #9ca3af;
  margin-bottom: 8px;
}

.er-badge {
  font-size: 0.85rem;
  padding: 4px 8px;
  border-radius: 6px;
}

.er-badge-gain { background: rgba(34,197,94,0.15); color: #4ade80; }
.er-badge-loss { background: rgba(239,68,68,0.15); color: #f87171; }
.er-badge-zero { background: rgba(156,163,175,0.1); color: #9ca3af; }

/* RESULTS */
.er-results-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.er-result-card {
  background: linear-gradient(145deg, #111827, #0f172a);
  border-radius: 16px;
  padding: 14px;
  border-left: 4px solid;
  display: flex;
  justify-content: space-between;
}

.er-result-area {
  font-weight: 600;
}

.er-result-party {
  font-size: 0.75rem;
  color: #9ca3af;
}

.er-result-meta {
  text-align: right;
  font-size: 0.75rem;
}

/* FOOTER */
.er-footer {
  padding: 12px;
  text-align: center;
  font-size: 0.7rem;
  color: #6b7280;
}

/* MOBILE */
@media (max-width: 768px) {

  .er-widget {
    border-radius: 0;
  }

  .er-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  .er-panel {
    padding: 16px;
  }

  .er-parties-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .er-result-card {
    flex-direction: column;
    gap: 6px;
  }

  .er-result-meta {
    text-align: left;
  }
}
</style>
